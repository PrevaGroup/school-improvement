[alembic]
script_location = migrations
prepend_sys_path = .

# ONE linear history, but each table-owning module keeps its own revision files
# (docs/MODULES.md "Migrations policy"). Alembic scans every path listed here and
# stitches the revisions into a single chain by down_revision — the folder a file
# sits in has no bearing on ordering, so this buys module ownership without the
# branch-merge pain of independent chains. `alembic history` shows the real order.
#
# Add a path when a module starts owning migrations. A module's revision file MUST
# live under a listed path or Alembic simply won't see it — and an unseen revision
# is a migration that silently never runs.
version_locations = migrations/versions likeschools/migrations evals/migrations
# The URL is set at runtime from MIGRATION_DATABASE_URL (see migrations/env.py),
# so this placeholder is intentionally inert.
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
