<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Long Beach — schools like you</title>
<style>
  :root {
    --bg: #f7f7f5; --panel: #fff; --ink: #1c1c1a; --muted: #6b6b66;
    --line: #e4e4df; --user: #2f6f4f; --accent: #b5533a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; justify-content: center;
  }
  .app { width: 100%; max-width: 780px; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 20px 20px 10px; border-bottom: 1px solid var(--line); }
  header h1 { margin: 0; font-size: 19px; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  .levels { display: flex; gap: 6px; margin-top: 12px; }
  .lvl {
    font-size: 13px; padding: 6px 16px; border: 1px solid var(--line); background: var(--panel);
    border-radius: 8px; cursor: pointer; color: var(--muted);
  }
  .lvl.active { background: var(--user); color: #fff; border-color: var(--user); }
  #log { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 88%; padding: 11px 14px; border-radius: 14px; white-space: pre-wrap; word-wrap: break-word; }
  .user { align-self: flex-end; background: var(--user); color: #fff; border-bottom-right-radius: 4px; }
  .bot  { align-self: flex-start; background: var(--panel); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .tools { align-self: flex-start; font-size: 12px; color: var(--muted); margin-top: -8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 20px 12px; }
  .chip {
    font-size: 13px; color: var(--ink); background: var(--panel); border: 1px solid var(--line);
    border-radius: 999px; padding: 7px 12px; cursor: pointer;
  }
  .chip:hover { border-color: var(--accent); }
  form { display: flex; gap: 8px; padding: 12px 20px 20px; border-top: 1px solid var(--line); background: var(--bg); }
  #q { flex: 1; padding: 11px 14px; border: 1px solid var(--line); border-radius: 12px; font: inherit; background: var(--panel); }
  button { padding: 0 18px; border: 0; border-radius: 12px; background: var(--user); color: #fff; font: inherit; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  .dots::after { content: "…"; animation: d 1.2s steps(4,end) infinite; }
  @keyframes d { 0%{content:""} 25%{content:"."} 50%{content:".."} 75%{content:"..."} }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#1a1a18; --panel:#242422; --ink:#ececea; --muted:#a0a09a; --line:#33332f; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Long Beach — schools like you</h1>
    <p>How Long Beach schools plan to improve attendance, and how each compares to demographically similar schools statewide.</p>
    <div class="levels" id="levels">
      <div class="lvl active" data-level="High">High</div>
      <div class="lvl" data-level="Middle">Middle</div>
      <div class="lvl" data-level="Primary">Primary</div>
    </div>
  </header>
  <div id="log"></div>
  <div class="chips" id="chips"></div>
  <form id="f">
    <input id="q" autocomplete="off" placeholder="Ask about Long Beach schools…" />
    <button id="send" type="submit">Send</button>
  </form>
</div>
<script>
  const log = document.getElementById("log");
  const form = document.getElementById("f");
  const input = document.getElementById("q");
  const send = document.getElementById("send");
  const chipsBox = document.getElementById("chips");
  const levels = document.getElementById("levels");
  let level = "High";
  let history = [];

  const CHIPS = {
    High: [
      "Who is Jordan High most like, and how does its attendance compare?",
      "Compare how Long Beach high schools plan to address attendance",
      "Which high schools are doing worse than their peers on chronic absenteeism?",
    ],
    Middle: [
      "Who are Hamilton Middle's demographic peers?",
      "How does Stephens Middle's chronic absenteeism compare to similar schools?",
    ],
    Primary: [
      "Who is Addams Elementary most like?",
      "How does Addams' attendance compare to its peer schools?",
    ],
  };

  function renderChips() {
    chipsBox.innerHTML = "";
    for (const t of CHIPS[level]) {
      const c = document.createElement("div");
      c.className = "chip";
      c.textContent = t;
      chipsBox.appendChild(c);
    }
    chipsBox.style.display = "flex";
  }

  function bubble(text, cls) {
    const el = document.createElement("div");
    el.className = "msg " + cls;
    el.textContent = text;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }

  async function ask(text) {
    chipsBox.style.display = "none";
    bubble(text, "user");
    history.push({ role: "user", content: text });
    input.value = "";
    send.disabled = true;
    const thinking = bubble("thinking", "bot");
    thinking.className = "msg bot dots";
    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history, level }),
      });
      if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
      const data = await res.json();
      thinking.remove();
      bubble(data.reply, "bot");
      if (data.tools_used && data.tools_used.length) {
        const t = document.createElement("div");
        t.className = "tools";
        t.textContent = "queried: " + data.tools_used.join(", ");
        log.appendChild(t);
      }
      history.push({ role: "assistant", content: data.reply });
    } catch (e) {
      thinking.remove();
      bubble("Error: " + e.message, "bot");
    } finally {
      send.disabled = false;
      input.focus();
    }
  }

  levels.addEventListener("click", (e) => {
    const b = e.target.closest(".lvl");
    if (!b || b.dataset.level === level) return;
    level = b.dataset.level;
    for (const el of levels.children) el.classList.toggle("active", el === b);
    history = [];        // switching level changes scope — start fresh
    log.innerHTML = "";
    renderChips();
  });
  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (text) ask(text);
  });
  chipsBox.addEventListener("click", (e) => {
    if (e.target.classList.contains("chip")) ask(e.target.textContent);
  });
  renderChips();
  input.focus();
</script>
</body>
</html>
