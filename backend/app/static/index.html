<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Long Beach — attendance diagnostics</title>
<style>
  :root {
    --bg:#f4f1ea; --panel:#fff; --ink:#211f1b; --muted:#6b675e; --line:#e2ddd2;
    --green:#2f6f4f; --amber:#c98a2b; --red:#b5423a; --accent:#b5533a;
  }
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  #root { display: flex; flex-direction: column; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .hdr { padding: 14px 22px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; background: var(--panel); }
  .hdr h1 { font-size: 17px; margin: 0; }
  .hdr .sub { color: var(--muted); font-size: 12px; }
  .spacer { flex: 1; }
  select, .seg button { font: inherit; }
  .ctrl { display: flex; flex-direction: column; gap: 3px; align-items: flex-start; }
  .ctrl > label { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 700; }
  .seg { display: inline-flex; gap: 4px; }
  .seg button { font-size: 13px; padding: 5px 12px; border: 1px solid var(--line); background: var(--panel); border-radius: 8px; color: var(--muted); cursor: pointer; }
  .seg button.on { background: var(--green); color: #fff; border-color: var(--green); }
  select { padding: 7px 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); color: var(--ink); }
  .cols { display: grid; grid-template-columns: 1fr 440px; flex: 1; min-height: 0; }
  .diag { overflow-y: auto; padding: 20px 22px; }
  .chat { border-left: 1px solid var(--line); display: flex; flex-direction: column; background: var(--panel); }
  .chat-hd { padding: 11px 14px; border-bottom: 1px solid var(--line); font-weight: 700; font-size: 13px; }
  .chat-hd .muted { font-weight: 400; font-size: 11px; }
  @media (max-width: 900px) {
    #root { height: auto; min-height: 100%; }
    .cols { grid-template-columns: 1fr; flex: none; }
    .diag { overflow: visible; }
    .chat { border-left: 0; border-top: 1px solid var(--line); height: 72vh; }
  }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; }
  .school-hd { margin-bottom: 14px; }
  .school-name { font-size: 26px; font-weight: 700; line-height: 1.1; }
  .school-sub { color: var(--muted); font-size: 12px; margin-top: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .sub-x { color: var(--muted); }
  .pill { border-radius: 999px; padding: 3px 12px; cursor: pointer; max-width: 100%; }
  .pill:hover { border-color: var(--muted); }
  .pill-lg { font-size: 24px; font-weight: 700; padding: 5px 14px; line-height: 1.15; }
  .school-sub .pill { color: var(--muted); }
  .feats { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 10px; font-size: 12px; }
  .feats > div { color: var(--muted); }
  .feats b { color: var(--ink); font-weight: 700; }
  .plan-sum { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  /* Always show a reserved (non-overlay) scrollbar so it can't hide, resize, or paint over
     the last column. scrollbar-gutter reserves the track's space outside the content. */
  .tbl-wrap { overflow-x: auto; overflow-y: scroll; max-height: 340px; scrollbar-gutter: stable;
    scrollbar-width: thin; scrollbar-color: var(--muted) transparent; }
  .tbl-wrap::-webkit-scrollbar { width: 10px; height: 10px; }
  .tbl-wrap::-webkit-scrollbar-track { background: transparent; }
  .tbl-wrap::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 6px; border: 2px solid var(--panel); }
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); font-weight: 700; padding: 4px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; position: sticky; top: 0; background: var(--panel); z-index: 1; }
  .sip-dot { color: var(--green); font-size: 9px; margin-left: 6px; vertical-align: middle; }
  .tbl td { padding: 6px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
  .tbl td.r, .tbl th.r { text-align: right; white-space: nowrap; }
  .tbl .d { color: var(--muted); font-size: 11px; }
  .banner { border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; color: #fff; font-weight: 600; }
  .b-unmet_need { background: var(--red); }
  .b-no_response { background: var(--amber); }
  .b-responsive { background: var(--green); }
  .b-ok { background: #6b675e; }
  .b-unknown { background: #9a958a; }
  /* plan_missing is a data gap, not a verdict: informational treatment, not a color alarm */
  .b-plan_missing { background: var(--panel); color: var(--muted); border: 1px dashed var(--line); }
  .kpi { display: flex; gap: 28px; flex-wrap: wrap; align-items: flex-end; }
  .kpi .big { font-size: 34px; font-weight: 700; line-height: 1; }
  .kpi .lab { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; color: #fff; text-transform: uppercase; letter-spacing: .03em; }
  .n-high { background: var(--red); } .n-moderate { background: var(--amber); } .n-low { background: var(--green); } .n-unknown { background: #9a958a; }
  h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 0 0 8px; }
  .info { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 15px; height: 15px; margin-left: 5px; border: 1px solid var(--muted); border-radius: 50%; color: var(--muted); font-size: 10px; font-weight: 700; font-style: normal; text-transform: none; cursor: help; vertical-align: middle; }
  .info .tip { display: none; position: absolute; top: 20px; left: -4px; z-index: 20; width: 260px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; font-size: 11px; font-weight: 400; line-height: 1.45; letter-spacing: 0; text-transform: none; color: var(--ink); box-shadow: 0 6px 18px rgba(0,0,0,.16); }
  .info:hover .tip, .info:focus .tip { display: block; }
  .goal { border-top: 1px solid var(--line); padding-top: 10px; margin-top: 10px; }
  .goal:first-child { border-top: 0; padding-top: 0; margin-top: 0; }
  .act { font-size: 14px; padding: 6px 0; }
  .act .meta { color: var(--muted); font-size: 12px; }
  .quote { color: var(--muted); font-size: 12px; font-style: italic; border-left: 2px solid var(--line); padding-left: 8px; margin-top: 3px; }
  .peer { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-top: 1px solid var(--line); }
  .peer:first-child { border-top: 0; }
  .peer .d { color: var(--muted); }
  .msgs { flex: 1; min-height: 0; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .m { max-width: 90%; padding: 9px 12px; border-radius: 12px; white-space: pre-wrap; font-size: 14px; }
  .m.u { align-self: flex-end; background: var(--green); color: #fff; }
  .m.a { align-self: flex-start; background: var(--bg); border: 1px solid var(--line); }
  .m.md { white-space: normal; }
  .m.md > :first-child { margin-top: 0; } .m.md > :last-child { margin-bottom: 0; }
  .m.md p { margin: 6px 0; }
  .m.md h1, .m.md h2, .m.md h3, .m.md h4 { font-size: 13px; font-weight: 700; margin: 8px 0 3px; }
  .m.md ul, .m.md ol { margin: 4px 0; padding-left: 18px; } .m.md li { margin: 2px 0; }
  .m.md code { background: var(--line); padding: 1px 4px; border-radius: 4px; font-size: 12px; }
  .m.md hr { border: 0; border-top: 1px solid var(--line); margin: 8px 0; }
  .tools { align-self: flex-start; font-size: 11px; color: var(--muted); margin-top: -6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 14px 8px; }
  .chip { font-size: 12px; border: 1px solid var(--line); background: var(--bg); border-radius: 999px; padding: 5px 10px; cursor: pointer; }
  form { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid var(--line); }
  form input { flex: 1; padding: 9px 12px; border: 1px solid var(--line); border-radius: 10px; font: inherit; }
  form button { padding: 0 14px; border: 0; border-radius: 10px; background: var(--green); color: #fff; cursor: pointer; }
  .muted { color: var(--muted); }
  .dots::after { content:"…"; animation: d 1.2s steps(4,end) infinite; }
  @keyframes d { 0%{content:""} 25%{content:"."} 50%{content:".."} 75%{content:"..."} }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#1a1917; --panel:#242320; --ink:#ecebe6; --muted:#a29d92; --line:#34322c; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import React, { useState, useEffect, useMemo } from "https://esm.sh/react@18.3.1";
import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
import htm from "https://esm.sh/htm@3.1.1";
import { marked } from "https://esm.sh/marked@12";
marked.setOptions({ breaks: true, gfm: true });
const html = htm.bind(React.createElement);
const fmtUSD = (n) => n == null ? "—" : "$" + Math.round(n).toLocaleString();
const fmtPct = (n) => n == null ? "—" : Math.round(n) + "%";
const fmtNum = (n) => n == null ? "—" : Number(n).toLocaleString();
const fmt1 = (n) => n == null ? "—" : Number(n).toFixed(1);
const feat = (v, kind, lab) => html`<div><b>${v == null ? "—" : kind === "pct" ? fmtPct(v) : kind === "num" ? fmtNum(v) : v}</b> <span>${lab}</span></div>`;

function PeerChart({ dist, value, direction }) {
  if (!dist || value == null) return html`<div class="muted">No comparable peer data.</div>`;
  // Fixed 0–100% scale: the dot's absolute position then reads the same as you flip schools,
  // so a 90% school looks far worse than a 20% one at a glance (not auto-rescaled per school).
  const lo = 0, hi = 100, W = 320, x = (v) => ((v - lo) / (hi - lo)) * W;
  const vx = x(value), vAnchor = vx > W - 22 ? "end" : (vx < 22 ? "start" : "middle");
  return html`
    <svg width="100%" viewBox="0 0 ${W} 44" style=${{ overflow: "visible", maxWidth: "440px", display: "block", margin: "0 auto" }}>
      <line x1="0" y1="22" x2=${W} y2="22" stroke="var(--line)" stroke-width="2" />
      <rect x=${x(dist.p25)} y="14" width=${Math.max(1, x(dist.p75) - x(dist.p25))} height="16" fill="var(--line)" rx="3"><title>Middle 50% of the ${dist.n} peers (25th–75th percentile): ${fmt1(dist.p25)}%–${fmt1(dist.p75)}%. Median ${fmt1(dist.median)}%.</title></rect>
      <line x1=${x(dist.median)} y1="12" x2=${x(dist.median)} y2="32" stroke="var(--muted)" stroke-width="2" />
      <circle cx=${x(value)} cy="22" r="7" fill="var(--red)" />
      <text x=${vx} y="10" text-anchor=${vAnchor} font-size="9" fill="var(--ink)">${fmt1(value)}</text>
      <text x="0" y="44" font-size="8" fill="var(--muted)">0%</text>
      <text x=${W} y="44" text-anchor="end" font-size="8" fill="var(--muted)">100%</text>
    </svg>
    <div class="muted" style=${{ fontSize: "12px", marginTop: "4px" }}>${dist.n} similar schools incl. this one · median ${fmt1(dist.median)}% · shaded box = middle 50% (hover for range) · ${direction === "lower_better" ? "lower is better" : "higher is better"} · red dot = this school</div>`;
}

function Diagnostic({ s, peers, level }) {
  if (!s) return html`<div class="muted">Select a school.</div>`;
  const perf = s.peer_performance_percentile;
  const worseThan = perf == null ? null : Math.round(100 - perf);
  const bannerText = {
    unmet_need: `Unmet need — worse than ${worseThan}% of similar schools on chronic absenteeism, with little or no funded attendance response.`,
    no_response: `Thin response — the plan funds little or no attendance action.`,
    responsive: `Responsive — a real need met with funded attendance strategies.`,
    ok: `On track relative to peers.`,
    plan_missing: worseThan == null
      ? `No attendance plan extracted for this school yet — showing metrics and peers.`
      : `Worse than ${worseThan}% of similar schools on chronic absenteeism — attendance plan not yet extracted, so the response isn't assessed.`,
    unknown: `Not enough data to assess.`,
  }[s.alignment];
  return html`
    <div class=${"banner b-" + s.alignment}>${bannerText}</div>
    <div class="card">
      <h3>Indicators</h3>
      <div class="kpi">
        <div><div class="big">${s.chronic_absenteeism_rate ?? "—"}%</div><div class="lab">chronic absenteeism ${s.chronic_absenteeism_year ? "(" + s.chronic_absenteeism_year + ")" : ""}</div></div>
        <div><div class="big">${perf == null ? "—" : perf}</div><div class="lab">percentile in its band <span class=${"badge n-" + s.need}>${s.need} need</span></div></div>
      </div>
      <div style=${{ marginTop: "14px" }}>${html`<${PeerChart} dist=${s.peer_distribution} value=${s.chronic_absenteeism_rate} direction="lower_better" />`}</div>
    </div>

    <div class="card">
      <h3>Attendance plan</h3>
      ${!s.has_plan
        ? html`<div class="muted">No SPSA on file for this school yet — its attendance planning is unknown (not zero). The indicators and peers above are unaffected.</div>`
        : ((s.attendance_goals && s.attendance_goals.length)
          ? html`
            <div class="plan-sum">${s.attendance_action_count} attendance ${s.attendance_action_count === 1 ? "action" : "actions"}${s.attendance_budget > 0 ? " · " + fmtUSD(s.attendance_budget) + " funded" : ""}</div>
            ${s.attendance_goals.map((g, gi) => html`
              <div class="goal" key=${gi}>
                <div><strong>${g.goal_type || "goal"} ${g.goal_number || ""}</strong> — ${(g.statement || "").slice(0, 140)}</div>
                ${(g.actions || []).map((a, ai) => html`
                  <div class="act" key=${ai}>
                    • ${a.strategy_text}
                    <div class="meta">${a.budgeted_amount != null ? fmtUSD(a.budgeted_amount) : "no funding listed"}${a.funding_source_raw ? " · " + a.funding_source_raw : ""}${a.provenance ? " · p" + a.provenance.page : ""}</div>
                    ${a.provenance && a.provenance.quote ? html`<div class="quote">"${a.provenance.quote}"</div>` : null}
                  </div>`)}
              </div>`)}`
          : html`<div class="muted">The SPSA is on file, but it funds no attendance-specific action — a real gap.</div>`)}
    </div>

    <div class="card">
      <h3>Schools like this one <span class="info" tabindex="0">i<span class="tip">Peers are the statewide schools most similar to this one on <b>inputs</b> — enrollment, econ-disadvantaged %, EL %, students-with-disabilities %, and locale — using Mahalanobis (covariance-adjusted) distance, computed within the same instructional level. Outcomes are never used to match, so "similar" means similar <b>students</b>, not similar results. The nearest ~50 form the comparison band.</span></span></h3>
      ${peers === null ? html`<div class="muted dots">loading peers</div>`
        : (peers.length ? html`
        <div class="tbl-wrap"><table class="tbl">
          <thead><tr><th>#</th><th>School</th><th class="r">Enroll</th><th class="r">Econ-dis</th><th class="r">EL</th><th class="r">SWD</th><th>Locale</th><th class="r">Chronic abs</th></tr></thead>
          <tbody>
            ${peers.map((p, i) => html`<tr key=${i}>
              <td>${p.rank}</td>
              <td>${p.school_name}${p.has_plan ? html`<span class="sip-dot" title="SPSA on file">●</span>` : null}<div class="d">${p.district_name}</div></td>
              <td class="r">${fmtNum(p.enroll_total)}</td>
              <td class="r">${fmtPct(p.pct_sed)}</td>
              <td class="r">${fmtPct(p.pct_el)}</td>
              <td class="r">${fmtPct(p.pct_swd)}</td>
              <td>${p.locale ?? "—"}</td>
              <td class="r">${p.chronic_absenteeism_rate == null ? "—" : p.chronic_absenteeism_rate + "%"}</td>
            </tr>`)}
          </tbody>
        </table></div>
        <div class="muted" style=${{ fontSize: "11px", marginTop: "6px" }}>Ranked by demographic similarity (enrollment · econ-disadv · EL · SWD · locale). Chronic abs = each peer's latest chronic-absenteeism rate. <span class="sip-dot">●</span> = SPSA on file.</div>`
        : html`<div class="muted">No peer set for this school.</div>`)}
    </div>`;
}

function Chat({ school, level }) {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const msgsRef = React.useRef(null);
  useEffect(() => { const el = msgsRef.current; if (el) el.scrollTop = el.scrollHeight; }, [msgs, busy]);
  const scoped = school ? school.school_name : "these schools";
  const chips = school ? [
    `Why is ${school.school_name} a concern on attendance?`,
    `What are ${school.school_name}'s peers doing that it isn't?`,
  ] : [`Compare Long Beach ${level} schools on attendance`];

  async function ask(text) {
    const next = [...msgs, { role: "user", content: text }];
    setMsgs(next); setInput(""); setBusy(true);
    try {
      const r = await fetch("/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ messages: next, level }) });
      const d = r.ok ? await r.json() : { reply: "Error: " + ((await r.json()).detail || r.statusText) };
      setMsgs([...next, { role: "assistant", content: d.reply, tools: d.tools_used }]);
    } catch (e) { setMsgs([...next, { role: "assistant", content: "Error: " + e.message }]); }
    finally { setBusy(false); }
  }
  return html`
    <div class="chat-hd">Ask Claude<span class="muted"> · grounded in the data</span></div>
    <div class="msgs" ref=${msgsRef}>
      ${msgs.length === 0 ? html`<div class="muted" style=${{ fontSize: "13px" }}>Ask about ${scoped} — grounded in the plans, metrics, and peer data.</div>` : null}
      ${msgs.map((m, i) => m.role === "user"
        ? html`<div class="m u" key=${i}>${m.content}</div>`
        : html`<div class="m a md" key=${i} dangerouslySetInnerHTML=${{ __html: marked.parse(m.content || "") }}></div>`)}
      ${busy ? html`<div class="m a dots">thinking</div>` : null}
    </div>
    <div class="chips">${chips.map((c, i) => html`<div class="chip" key=${i} onClick=${() => ask(c)}>${c}</div>`)}</div>
    <form onSubmit=${(e) => { e.preventDefault(); if (input.trim() && !busy) ask(input.trim()); }}>
      <input value=${input} placeholder=${"Ask about " + scoped + "…"} onInput=${(e) => setInput(e.target.value)} />
      <button disabled=${busy}>Send</button>
    </form>`;
}

function App() {
  const [level, setLevel] = useState("High");
  const [districtId, setDistrictId] = useState("0622500");
  const [districts, setDistricts] = useState([]);
  const [schools, setSchools] = useState([]);
  const [sel, setSel] = useState(null);
  const [peers, setPeers] = useState(null);
  const [loadState, setLoadState] = useState("loading"); // loading | ready | error

  useEffect(() => { fetch("/marts/districts").then(r => r.json()).then(d => setDistricts(d.districts || [])).catch(() => {}); }, []);

  useEffect(() => {
    setSchools([]); setSel(null); setLoadState("loading");
    fetch(`/marts/attendance-diagnostic?district_id=${districtId}&level=${level}`).then(r => r.json()).then(d => {
      setSchools(d.schools || []);
      setSel((d.schools || [])[0] || null);
      setLoadState("ready");
    }).catch(() => setLoadState("error"));
  }, [level, districtId]);

  const current = useMemo(() => schools.find(s => sel && s.school_id === sel.school_id) || sel, [schools, sel]);

  useEffect(() => {
    if (!current) { setPeers(null); return; }
    setPeers(null);
    fetch(`/marts/like-schools?school_id=${current.school_id}&k=50`).then(r => r.json()).then(d => setPeers(d.peers || []));
  }, [current && current.school_id]);

  return html`
    <div class="cols">
      <div class="diag">
        <div class="school-hd">
          <select class="pill pill-lg" title="Select a school" value=${current ? current.school_id : ""} onChange=${(e) => setSel(schools.find(s => s.school_id === e.target.value))}>
            ${schools.length === 0 ? html`<option>${loadState === "loading" ? "loading…" : loadState === "error" ? "failed to load" : "no schools"}</option>` : schools.map(s => html`<option key=${s.school_id} value=${s.school_id}>${s.alignment === "unmet_need" ? "⚠ " : ""}${s.school_name}</option>`)}
          </select>
          <div class="school-sub">
            <select class="pill" title="Select a district" value=${districtId} onChange=${(e) => setDistrictId(e.target.value)}>
              ${districts.length === 0 ? html`<option value=${districtId}>Long Beach Unified</option>` : districts.map(d => html`<option key=${d.district_id} value=${d.district_id}>${d.district_name}</option>`)}
            </select>
            <select class="pill" title="Select a level" value=${level} onChange=${(e) => setLevel(e.target.value)}>
              ${["High", "Middle", "Primary"].map(l => html`<option key=${l} value=${l}>${l}</option>`)}
            </select>
            <span class="sub-x">schools</span>
          </div>
          ${current ? html`<div class="feats">
            ${feat(current.enroll_total, "num", "enrollment")}
            ${feat(current.pct_sed, "pct", "econ-disadv")}
            ${feat(current.pct_el, "pct", "English learners")}
            ${feat(current.pct_swd, "pct", "students w/ disab.")}
            ${feat(current.locale, "str", "locale")}
          </div>` : null}
        </div>
        ${html`<${Diagnostic} s=${current} peers=${peers} level=${level} />`}
      </div>
      <div class="chat">${html`<${Chat} school=${current} level=${level} />`}</div>
    </div>`;
}

createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
