[pytest]
# Run from backend/ (or repo root): `python -m pytest`. conftest.py puts backend/ on
# sys.path so tests can `import etl...` / `import app...` the way the loaders expect,
# and supplies a fake DB password so `app/*` is importable without credentials.
# EVERY test directory must be listed. A path missing here is not an error — the tests simply
# never run and the suite still reports green. That has already happened once: `tests/` was
# omitted, so test_marts.py never ran for its entire life. Add `backend/<module>/tests/` here
# the moment a module gets one.
testpaths = etl app tests likeschools public_metrics
addopts = -q
